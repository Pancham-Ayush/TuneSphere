apiVersion: apps/v1
kind: Deployment

metadata:
  name: yt-s3-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: yt-s3-pod

  template:
    metadata:
      labels:
        app: yt-s3-pod

    spec:
      containers:
        - name: yt-s3-service
          image: panchamayush/yt-s3-service:latest
          envFrom:
            - secretRef:
                name: env-prop