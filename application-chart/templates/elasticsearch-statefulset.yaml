apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch-stateful-set

spec:
  replicas: 2
  selector:
    matchLabels:
      app: elasticsearch-pod

  serviceName: elasticsearch-headless-service

  template:
    metadata:
      labels:
        app: elasticsearch-pod

    spec:
      containers:
        - name: elasticsearch-container

          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

          ports:
            - containerPort: 9200
              name: rest

            - containerPort: 9300
              name: transport

          env:
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: cluster.name
              value: elasticsearch-cluster

            - name: discovery.seed_hosts
              value: "elasticsearch-stateful-set-0.elasticsearch-headless-service,elasticsearch-stateful-set-1.elasticsearch-headless-service"

            - name: cluster.initial_master_nodes
              value: "elasticsearch-stateful-set-0,elasticsearch-stateful-set-1"

            - name: xpack.security.enabled
              value: "false"

            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"

          volumeMounts:
            - name: elasticsearch-storage
              mountPath: /usr/share/elasticsearch/data

  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 5Gi