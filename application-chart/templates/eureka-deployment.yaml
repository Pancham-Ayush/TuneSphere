apiVersion: apps/v1
kind: Deployment

metadata:
  name: eureka-server-deploy

spec:
  selector:
    matchLabels:
      app: eureka-pod

  template:
    metadata:
      labels:
        app: eureka-pod
    spec:
      containers:
        - name: eureka-app
          image: {{ .Values.eurekaServerImage }}
          ports:
            - containerPort: 8761

